<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bgCat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f15;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bgCat)" rx="12"/>

  <!-- Card 1: NEOM -->
  <g filter="url(#shadow)">
    <rect x="20" y="20" width="130" height="160" rx="10" fill="#0d1f1a" stroke="#06b6d4" stroke-width="1.5" opacity="0.95"/>
    <text x="85" y="75" text-anchor="middle" font-size="36">🏗️</text>
    <text x="85" y="105" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#06b6d4">NEOM &amp;</text>
    <text x="85" y="122" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#06b6d4">Megaprojects</text>
    <text x="85" y="150" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#666">20 Questions</text>
  </g>

  <!-- Card 2: Vision 2030 -->
  <g filter="url(#shadow)">
    <rect x="165" y="20" width="130" height="160" rx="10" fill="#0d1f1a" stroke="#8b5cf6" stroke-width="1.5" opacity="0.95"/>
    <text x="230" y="75" text-anchor="middle" font-size="36">📊</text>
    <text x="230" y="105" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#8b5cf6">Vision 2030</text>
    <text x="230" y="122" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#8b5cf6">Goals</text>
    <text x="230" y="150" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#666">20 Questions</text>
  </g>

  <!-- Card 3: Culture -->
  <g filter="url(#shadow)">
    <rect x="310" y="20" width="130" height="160" rx="10" fill="#0d1f1a" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
    <text x="375" y="75" text-anchor="middle" font-size="36">🎭</text>
    <text x="375" y="105" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">Saudi Culture</text>
    <text x="375" y="122" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">&amp; Heritage</text>
    <text x="375" y="150" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#666">20 Questions</text>
  </g>

  <!-- Card 4: Geography -->
  <g filter="url(#shadow)">
    <rect x="455" y="20" width="130" height="160" rx="10" fill="#0d1f1a" stroke="#22c55e" stroke-width="1.5" opacity="0.95"/>
    <text x="520" y="75" text-anchor="middle" font-size="36">🌍</text>
    <text x="520" y="105" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#22c55e">Geography &amp;</text>
    <text x="520" y="122" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#22c55e">Landmarks</text>
    <text x="520" y="150" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#666">20 Questions</text>
  </g>

  <!-- Card 5: History -->
  <g filter="url(#shadow)">
    <rect x="600" y="20" width="130" height="160" rx="10" fill="#0d1f1a" stroke="#ef4444" stroke-width="1.5" opacity="0.95"/>
    <text x="665" y="75" text-anchor="middle" font-size="36">📜</text>
    <text x="665" y="105" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#ef4444">History &amp;</text>
    <text x="665" y="122" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Kings</text>
    <text x="665" y="150" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#666">20 Questions</text>
  </g>

  <!-- Card 6: Arabic -->
  <g filter="url(#shadow)">
    <rect x="745" y="20" width="130" height="160" rx="10" fill="#0d1f1a" stroke="#ec4899" stroke-width="1.5" opacity="0.95"/>
    <text x="810" y="75" text-anchor="middle" font-size="36">🗣️</text>
    <text x="810" y="105" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#ec4899">Arabic</text>
    <text x="810" y="122" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#ec4899">Language</text>
    <text x="810" y="150" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#666">20 Questions</text>
  </g>
</svg>
