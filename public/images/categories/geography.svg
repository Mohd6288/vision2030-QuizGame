<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a2c"/>
      <stop offset="100%" stop-color="#0f2318"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2a04e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B7D3C" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- Mountains (Asir) -->
  <polygon points="0,200 60,100 120,160 180,80 240,130 300,90 360,140 400,110 400,200" fill="#22c55e" opacity="0.2"/>
  <polygon points="0,200 40,140 100,180 160,120 220,160 280,110 340,150 400,130 400,200" fill="#22c55e" opacity="0.15"/>
  <!-- Desert sand dunes -->
  <path d="M0 200 Q50 185 100 200 Q150 215 200 200 Q250 185 300 200 Q350 215 400 200 L400 300 L0 300 Z" fill="url(#sand)"/>
  <path d="M0 220 Q60 210 120 220 Q180 230 240 220 Q300 210 360 220 Q380 225 400 220 L400 300 L0 300 Z" fill="#c2a04e" opacity="0.15"/>
  <!-- Sun -->
  <circle cx="320" cy="60" r="25" fill="#22c55e" opacity="0.2"/>
  <circle cx="320" cy="60" r="20" fill="#22c55e" opacity="0.15"/>
  <!-- Palm trees -->
  <line x1="80" y1="200" x2="80" y2="160" stroke="#22c55e" stroke-width="3" opacity="0.4"/>
  <path d="M80 160 C70 150 60 155 55 150" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M80 160 C85 148 95 148 100 145" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M80 160 C75 148 70 145 65 140" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M80 163 C90 153 100 155 105 152" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.35"/>
  <!-- Camel silhouette -->
  <ellipse cx="260" cy="195" rx="25" ry="12" fill="#22c55e" opacity="0.2"/>
  <ellipse cx="245" cy="188" rx="6" ry="4" fill="#22c55e" opacity="0.2"/>
  <line x1="245" y1="207" x2="245" y2="220" stroke="#22c55e" stroke-width="2" opacity="0.2"/>
  <line x1="255" y1="207" x2="255" y2="220" stroke="#22c55e" stroke-width="2" opacity="0.2"/>
  <line x1="268" y1="207" x2="268" y2="220" stroke="#22c55e" stroke-width="2" opacity="0.2"/>
  <line x1="275" y1="207" x2="275" y2="220" stroke="#22c55e" stroke-width="2" opacity="0.2"/>
  <!-- Red Sea indicator -->
  <rect x="0" y="240" width="30" height="60" fill="#06b6d4" opacity="0.15"/>
  <text x="15" y="270" text-anchor="middle" font-size="8" fill="#06b6d4" opacity="0.4" transform="rotate(-90 15 270)">Red Sea</text>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#22c55e" opacity="0.5">Geography &amp; Landmarks</text>
</svg>