<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="120" cy="50" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="300" cy="25" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="350" cy="60" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="250" cy="40" r="1.2" fill="#fff" opacity="0.5"/>
  <!-- THE LINE structure — two parallel mirrored walls -->
  <rect x="20" y="80" width="360" height="160" rx="4" fill="url(#glass)" stroke="#06b6d4" stroke-width="1"/>
  <!-- Glass panels -->
  <line x1="60" y1="80" x2="60" y2="240" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="80" x2="100" y2="240" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <line x1="140" y1="80" x2="140" y2="240" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <line x1="180" y1="80" x2="180" y2="240" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="80" x2="220" y2="240" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <line x1="260" y1="80" x2="260" y2="240" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <line x1="300" y1="80" x2="300" y2="240" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <line x1="340" y1="80" x2="340" y2="240" stroke="#06b6d4" stroke-width="0.5" opacity="0.4"/>
  <!-- Horizontal divisions -->
  <line x1="20" y1="120" x2="380" y2="120" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="160" x2="380" y2="160" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="200" x2="380" y2="200" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  <!-- Glowing windows -->
  <rect x="65" y="130" width="30" height="20" rx="2" fill="#06b6d4" opacity="0.3"/>
  <rect x="145" y="90" width="30" height="20" rx="2" fill="#06b6d4" opacity="0.25"/>
  <rect x="225" y="170" width="30" height="20" rx="2" fill="#06b6d4" opacity="0.3"/>
  <rect x="305" y="100" width="30" height="20" rx="2" fill="#06b6d4" opacity="0.2"/>
  <!-- Ground / desert -->
  <rect x="0" y="240" width="400" height="60" fill="#c2a04e" opacity="0.3"/>
  <!-- NEOM text -->
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#06b6d4" opacity="0.6">NEOM — THE LINE</text>
</svg>