<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Central 2030 emblem -->
  <circle cx="200" cy="130" r="70" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="200" cy="130" r="55" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.25"/>
  <circle cx="200" cy="130" r="85" stroke="#8b5cf6" stroke-width="0.8" fill="none" opacity="0.15"/>
  <!-- Three pillars -->
  <rect x="110" y="170" width="40" height="80" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <rect x="180" y="150" width="40" height="100" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <rect x="250" y="160" width="40" height="90" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <!-- Pillar icons -->
  <text x="130" y="200" text-anchor="middle" font-size="18">&#127970;</text>
  <text x="200" y="185" text-anchor="middle" font-size="18">&#128200;</text>
  <text x="270" y="195" text-anchor="middle" font-size="18">&#127758;</text>
  <!-- Growth arrow -->
  <polyline points="90,230 150,200 200,180 250,160 310,130 340,110" stroke="#8b5cf6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <polygon points="340,105 350,115 335,115" fill="#8b5cf6" opacity="0.6"/>
  <!-- 2030 text -->
  <text x="200" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#8b5cf6" opacity="0.7">2030</text>
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6" opacity="0.5">Vision 2030 Goals</text>
</svg>